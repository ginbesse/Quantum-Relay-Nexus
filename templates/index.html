<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quantum Relay Nexus</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #12213a 0%, #060814 60%, #02040a 100%);
      color: #e8f2ff;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .panel {
      width: min(900px, 92vw);
      background: rgba(7, 14, 28, 0.84);
      border: 1px solid rgba(94, 180, 255, 0.35);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(52, 126, 255, 0.25);
      padding: 32px;
      backdrop-filter: blur(16px);
    }
    h1 { margin-top: 0; font-size: 2rem; }
    .badge { display: inline-block; padding: 6px 12px; border-radius: 999px; background: rgba(74, 184, 255, 0.16); color: #8fd4ff; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 18px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px; }
    button, input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); margin-top: 8px; }
    button { cursor: pointer; background: linear-gradient(90deg, #2d8cff, #4ef0ff); color: white; font-weight: 700; }
    .status { margin-top: 10px; color: #8fd4ff; }
    .footer { margin-top: 18px; color: #7aa7d8; font-size: 0.95rem; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="panel">
    <div class="badge">Quantum Relay Nexus • 2070 Relay Interface</div>
    <h1>Gelecek Nesil Relay Sistemi</h1>
    <p>Bu arayüz, aktarım sisteminin durumunu gösterir ve mesaj gönderimi için modern, akıcı bir deneyim sunar.</p>
    <div class="grid">
      <div class="card">
        <h3>Durum</h3>
        <div id="status" class="status">Bağlanıyor...</div>
      </div>
      <div class="card">
        <h3>Mesaj Gönder</h3>
        <textarea id="message" rows="4" placeholder="Yüksek güvenlikli relay mesajı..."></textarea>
        <input id="token" placeholder="Auth token">
        <button onclick="sendMessage()">Gönder</button>
      </div>
    </div>
    <div class="footer">Sunucu: TCP relay + HTTP kontrol katmanı + akıllı doğrulama</div>
  </div>
  <script>
    async function sendMessage() {
      const message = document.getElementById('message').value;
      const token = document.getElementById('token').value;
      const res = await fetch('/relay', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, auth_token: token })
      });
      const data = await res.json();
      document.getElementById('status').textContent = data.accepted ? 'Mesaj başarıyla iletildi.' : 'İşlem reddedildi.';
    }

    async function loadStatus() {
      const res = await fetch('/status');
      const data = await res.json();
      document.getElementById('status').textContent = data.status === 'online' ? 'Relay sistemi aktif.' : 'Bağlantı bekleniyor.';
    }
    loadStatus();
  </script>
</body>
</html>
